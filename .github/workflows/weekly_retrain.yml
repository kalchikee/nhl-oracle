name: Weekly Model Retrain

on:
  schedule:
    # Every Monday at 3:00 AM UTC (9pm Sunday CST)
    - cron: '0 3 * * 1'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 90   # Training can take a while

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run model training (5-year historical data)
        run: cd src && python train_model.py

      - name: Commit updated model
        run: |
          git config --global user.email "nhl-oracle-bot@github.com"
          git config --global user.name "NHL Oracle Bot"
          git add models/ data/cache/ || true
          git diff --staged --quiet || git commit -m "Retrain model $(date -u +%Y-%m-%d) [skip ci]"
          git push || echo "Nothing to push"
